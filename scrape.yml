name: Daily RE Scrape

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8am UTC
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      site:
        description: 'Site to scrape (leave blank for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - realtor_ca
          - kijiji
          - point2homes
      city:
        description: 'City filter e.g. "Vancouver" (leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper pipeline
        run: |
          python3 scheduler.py \
            ${{ github.event.inputs.site != '' && format('--site {0}', github.event.inputs.site) || '' }} \
            ${{ github.event.inputs.city != '' && format('--city "{0}"', github.event.inputs.city) || '' }}

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: scrape run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
